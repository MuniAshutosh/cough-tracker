<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cough Tracker + Analytics</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #2196F3; --success: #4CAF50; --danger: #f44336; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: #333; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-val { font-size: 1.5rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.8rem; color: #777; text-transform: uppercase; }

        /* Controls */
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
        .start { background: var(--success); color: white; }
        .stop { background: var(--danger); color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Visuals */
        .chart-container { height: 200px; margin-top: 10px; }
        .log-list { max-height: 250px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #eee; }
        .log-item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f1f1f1; font-size: 0.9rem; }
        .timestamp { color: #888; }
        .label-tag { background: #e3f2fd; color: var(--primary); padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        
        #status-dot { height: 10px; width: 10px; background: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .active-dot { background: var(--success) !important; box-shadow: 0 0 8px var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="text-align: center;">
        <h2 style="margin-top:0">CoughMonitor <span style="font-weight: 300;">AI</span></h2>
        <div style="margin-bottom: 20px;">
            <span id="status-dot"></span>
            <span id="status-text" style="font-weight: 500; color: #666;">Ready</span>
        </div>
        <div class="btn-group">
            <button id="startBtn" class="start shadow">Start Session</button>
            <button id="stopBtn" class="stop" disabled>End Session</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-val" id="totalCoughs">0</span>
            <span class="stat-label">Detections</span>
        </div>
        <div class="stat-box">
            <span class="stat-val" id="lastTime">--:--</span>
            <span class="stat-label">Last Event</span>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-top:0">Activity Graph (Last 24h)</h3>
        <div class="chart-container">
            <canvas id="coughChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3 style="margin:0">Live Logs</h3>
        <div id="logList" class="log-list">
            <div style="text-align:center; color:#999; padding:20px;">No data recorded yet.</div>
        </div>
        <div style="display: flex; gap:10px; margin-top:15px;">
            <button onclick="exportCSV()" style="background:#eee; color:#333; padding:10px;">Export CSV</button>
            <button onclick="clearLogs()" style="background:#eee; color:var(--danger); padding:10px;">Clear</button>
        </div>
    </div>
</div>

<script>
    let recognizer;
    let coughChart;
    let logs = JSON.parse(localStorage.getItem('cough_v2_logs') || '[]');

    // Initialize Chart
    function initChart() {
        const ctx = document.getElementById('coughChart').getContext('2d');
        coughChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                datasets: [{
                    label: 'Cough Frequency',
                    data: new Array(24).fill(0),
                    backgroundColor: '#2196F3',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                plugins: { legend: { display: false } }
            }
        });
        updateChartData();
    }

    function updateChartData() {
        const hourlyCounts = new Array(24).fill(0);
        logs.forEach(log => {
            const hour = new Date(log.timestamp).getHours();
            hourlyCounts[hour]++;
        });
        coughChart.data.datasets[0].data = hourlyCounts;
        coughChart.update();
        
        document.getElementById('totalCoughs').innerText = logs.length;
        if(logs.length > 0) {
            const last = new Date(logs[logs.length-1].timestamp);
            document.getElementById('lastTime').innerText = last.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
    }

    async function startTracking() {
        const statusText = document.getElementById('status-text');
        const dot = document.getElementById('status-dot');
        
        try {
            if (!recognizer) {
                statusText.innerText = "Loading AI...";
                recognizer = speechCommands.create("BROWSER_FFT");
                await recognizer.ensureModelLoaded();
            }

            dot.classList.add('active-dot');
            statusText.innerText = "Monitoring Environment...";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;

            recognizer.listen(result => {
                const index = result.scores.indexOf(Math.max(...result.scores));
                const label = recognizer.wordLabels()[index];

                // Simplified Logic: Treat non-background significant sounds as events
                if (result.scores[index] > 0.85 && label !== '_background_noise_') {
                    addEntry(label);
                }
            }, { probabilityThreshold: 0.85, overlapFactor: 0.5 });

        } catch (e) {
            alert("Mic access required for AI tracking.");
            console.error(e);
        }
    }

    function addEntry(label) {
        const entry = { timestamp: new Date().toISOString(), type: label };
        logs.push(entry);
        localStorage.setItem('cough_v2_logs', JSON.stringify(logs));
        renderLogs();
        updateChartData();
    }

    function renderLogs() {
        const container = document.getElementById('logList');
        if (logs.length === 0) return;
        
        container.innerHTML = logs.slice().reverse().map(log => `
            <div class="log-item">
                <span class="timestamp">${new Date(log.timestamp).toLocaleTimeString()}</span>
                <span class="label-tag">${log.type}</span>
            </div>
        `).join('');
    }

    function stopTracking() {
        if (recognizer) recognizer.stopListening();
        document.getElementById('status-dot').classList.remove('active-dot');
        document.getElementById('status-text').innerText = "Paused";
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }

    function exportCSV() {
        let csv = "Time,Event\n" + logs.map(l => `${l.timestamp},${l.type}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `cough_report_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function clearLogs() {
        if(confirm("Delete all data?")) {
            logs = [];
            localStorage.removeItem('cough_v2_logs');
            renderLogs();
            updateChartData();
        }
    }

    document.getElementById('startBtn').onclick = startTracking;
    document.getElementById('stopBtn').onclick = stopTracking;

    // Run on Load
    initChart();
    renderLogs();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
